<script>

let ws;
let ctx;

function start() {

ctx =
new AudioContext({sampleRate:16000});

ws = new WebSocket(
"wss://esp32-audio-server-1.onrender.com/ws",
"listener");

ws.binaryType="arraybuffer";

ws.onmessage = e => {

let data =
new Int16Array(e.data);

let f32 =
new Float32Array(data.length);

for(let i=0;i<data.length;i++)
f32[i]=data[i]/32768;

let buf =
ctx.createBuffer(
1,
f32.length,
16000);

buf.copyToChannel(f32,0);

let src=
ctx.createBufferSource();

src.buffer=buf;
src.connect(ctx.destination);
src.start();

};

}

</script>
